<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FiestApp{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3a;
      --accent: #ff3366;
      --accent2: #7c3aed;
      --neon: #00ffcc;
      --text: #e8e8f0;
      --muted: #7070a0;
      --danger: #ff4444;
      --success: #22c55e;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
    }
    .nav-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .nav a {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color .2s;
    }
    .nav a:hover { color: var(--text); text-decoration: none; }
    .nav .badge {
      background: var(--accent);
      color: white;
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 10px;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 1px;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all .2s;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #e0004a; color: white; text-decoration: none; }
    .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }
    .btn-success { background: var(--success); color: #000; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 11px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.5rem;
      position: relative;
    }
    .card:hover { border-color: var(--accent2); }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .tag-abierta { background: #052e16; color: var(--success); border: 1px solid #166534; }
    .tag-llena { background: #1c1400; color: var(--warn); border: 1px solid #92400e; }
    .tag-cancelada { background: #1a0000; color: var(--danger); border: 1px solid #7f1d1d; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: #0f0f18;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .alert {
      padding: 12px 16px;
      margin-bottom: 1rem;
      font-size: 13px;
      border-left: 3px solid;
    }
    .alert-error { background: #1a0000; border-color: var(--danger); color: #fca5a5; }
    .alert-success { background: #052e16; border-color: var(--success); color: #86efac; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 3px; }
    h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; }
    h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 1px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .text-muted { color: var(--muted); }
    .text-accent { color: var(--accent); }
    .text-neon { color: var(--neon); }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-1 { gap: 0.5rem; }
    .gap-2 { gap: 1rem; }
    .justify-between { justify-content: space-between; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">🎉 FIESTAPP</span>
    <a href="/fiestas/">Fiestas</a>
    <a href="/invitados/">
      Invitados <span class="badge">FE1</span>
    </a>
    <a href="/localizacion/">
      Localizar <span class="badge">FE2</span>
    </a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
